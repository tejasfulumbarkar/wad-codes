<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: #ccc;
            text-decoration: none;
            display: block;
            padding: 10px 20px;
        }

        .sidebar a:hover {
            background: #343a40;
            color: white;
        }

        /* Cards */
        .card {
            border-radius: 15px;
        }

        /* Mobile sidebar */
        @media (max-width: 768px) {
            .sidebar {
                height: auto;
            }
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4 class="text-center">Dashboard</h4>
            <a href="#">Home</a>
            <a href="#">Students</a>
            <a href="#">Courses</a>
            <a href="#">Exams</a>
            <a href="#">Results</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <!-- Navbar -->
            <nav class="navbar navbar-light bg-light mb-4">
                <span class="navbar-brand mb-0 h4">College Admin Dashboard</span>
            </nav>

            <!-- Cards -->
            <div class="row">

                <div class="col-md-3 mb-4">
                    <div class="card bg-primary text-white p-3">
                        <h5>Total Students</h5>
                        <h2>1200</h2>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card bg-success text-white p-3">
                        <h5>Total Courses</h5>
                        <h2>35</h2>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card bg-warning text-white p-3">
                        <h5>Exams Conducted</h5>
                        <h2>15</h2>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card bg-danger text-white p-3">
                        <h5>Pending Results</h5>
                        <h2>5</h2>
                    </div>
                </div>

            </div>

            <!-- Table Example -->
            <div class="card p-3">
                <h5>Recent Students</h5>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Tejas</td>
                            <td>IT</td>
                            <td>Active</td>
                        </tr>
                        <tr>
                            <td>Rahul</td>
                            <td>CS</td>
                            <td>Active</td>
                        </tr>
                        <tr>
                            <td>Anjali</td>
                            <td>ENTC</td>
                            <td>Inactive</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

</body>
</html>
